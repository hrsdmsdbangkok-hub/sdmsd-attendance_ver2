<script>
    const TARGET_LAT = 13.766324; 
    const TARGET_LON = 100.470656;
    const RADIUS_LIMIT = 500;      

    let userGps = "";
    let photoData = "";
    let photoTimestamp = null; 
    let streamRef = null;
    let currentDistance = null;

    const submitBtn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');
    const video = document.getElementById('video');
    const photoPreview = document.getElementById('photoPreview');
    const snapBtn = document.getElementById('snapBtn');
    
    const locationTypeHidden = document.getElementById('locationType');
    const actionTypeHidden = document.getElementById('actionType');
    const workTimeScopeHidden = document.getElementById('workTimeScope');
    const missionGroup = document.getElementById('missionGroup');
    const missionDetail = document.getElementById('missionDetail');

    window.addEventListener('DOMContentLoaded', () => {
        checkLocation();
        startCamera();
        bindSegmentButtons();
    });

    function bindSegmentButtons() {
        const segments = document.querySelectorAll('.btn-segment');
        segments.forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const value = this.getAttribute('data-value');
                
                const siblingButtons = document.querySelectorAll(`.btn-segment[data-target="${targetId}"]`);
                siblingButtons.forEach(b => b.classList.remove('active'));
                
                this.classList.add('active');
                document.getElementById(targetId).value = value;
                
                if (targetId === 'locationType') {
                    evaluateButtonStatus();
                    checkLocation();
                }
                toggleMissionInput();
            });
        });
    }

    document.getElementById('empType').addEventListener('change', function() {
        const workTimeGroup = document.getElementById('workTimeGroup');
        if (this.value === "บุคคลภายนอกที่ช่วยปฏิบัติราชการ") {
            workTimeGroup.style.display = 'block';
        } else {
            workTimeGroup.style.display = 'none';
        }
    });

    function toggleMissionInput() {
        const isOutside = locationTypeHidden.value === "นอกสถานที่";
        const isCheckIn = actionTypeHidden.value === "เข้างาน";

        if (isOutside && isCheckIn) {
            missionGroup.style.display = 'block';
            missionDetail.required = true;
        } else {
            missionGroup.style.display = 'none';
            missionDetail.required = false;
            missionDetail.value = ""; 
        }
    }

    function checkLocation() {
        if (!navigator.geolocation) {
            updateSubmitStatus("Browser ไม่รองรับ GPS", "danger");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                userGps = lat + "," + lon;
                
                currentDistance = haversineDistance(lat, lon, TARGET_LAT, TARGET_LON);
                evaluateButtonStatus(); 
            },
            function(err) {
                if (locationTypeHidden.value === "นอกสถานที่") {
                    userGps = "ไม่พบพิกัด (นอกสถานที่)";
                    submitBtn.disabled = false;
                    submitBtn.className = "btn-submit active-btn";
                    submitBtn.innerText = "📌 บันทึกเวลาปฏิบัติงาน (นอกสถานที่)";
                } else {
                    updateSubmitStatus("❌ โปรดเปิดสิทธิ์เข้าถึง GPS บนมือถือ", "danger");
                }
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
        );
    }

    function evaluateButtonStatus() {
        const isOnSite = locationTypeHidden.value === "นอกสถานที่";
        if (isOnSite) {
            submitBtn.disabled = false;
            submitBtn.className = "btn-submit active-btn";
            submitBtn.innerText = "📌 บันทึกเวลาปฏิบัติงาน (นอกสถานที่)";
        } else {
            if (currentDistance !== null) {
                if (currentDistance <= RADIUS_LIMIT) {
                    submitBtn.disabled = false;
                    submitBtn.className = "btn-submit active-btn";
                    submitBtn.innerText = "📌 บันทึกเวลา (ในพิกัดงาน " + Math.round(currentDistance) + " ม.)";
                } else {
                    updateSubmitStatus("❌ อยู่นอกพื้นที่ทำงาน (ห่าง " + Math.round(currentDistance) + " ม.)", "danger");
                }
            } else {
                updateSubmitStatus("กำลังรอตรวจสอบพิกัด GPS...", "default");
                submitBtn.disabled = true;
            }
        }
    }

    // 🟢 แก้ไขสูตรคำนวณที่ถูกต้องเรียบร้อยครับ
    function haversineDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function updateSubmitStatus(text, type) {
        submitBtn.innerText = text;
        if(type === "danger") {
            submitBtn.className = "btn-submit danger-btn";
        } else {
            submitBtn.className = "btn-submit";
        }
    }

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => { streamRef = stream; video.srcObject = stream; })
            .catch(err => {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => { streamRef = stream; video.srcObject = stream; });
            });
    }

    snapBtn.addEventListener('click', () => {
        if (video.style.display !== 'none') {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            photoData = canvas.toDataURL('image/jpeg', 0.6); 
            photoPreview.src = photoData;
            photoTimestamp = new Date(); 
            video.style.display = 'none'; photoPreview.style.display = 'block';
            snapBtn.innerText = "🔄 ถ่ายใหม่อีกครั้ง";
        } else {
            video.style.display = 'block'; photoPreview.style.display = 'none';
            snapBtn.innerText = "📸 กดถ่ายภาพ"; photoData = ""; photoTimestamp = null;
        }
    });

    document.getElementById('mainForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        if (!photoData || !photoTimestamp) {
            alert("กรุณากดถ่ายภาพเซลฟี่ยืนยันตัวตนก่อนบันทึกเวลาครับ");
            return;
        }

        const nowCheck = new Date();
        const timeDiffMinutes = (nowCheck - photoTimestamp) / 1000 / 60;
        if (timeDiffMinutes > 5) {
            alert("❌ ภาพถ่ายนี้ถ่ายไว้นานเกิน 5 นาทีแล้ว เพื่อความปลอดภัยกรุณากดถ่ายภาพใหม่อีกครั้ง ณ ตำแหน่งปัจจุบันของคุณครับ");
            video.style.display = 'block'; photoPreview.style.display = 'none';
            snapBtn.innerText = "📸 กดถ่ายภาพ"; photoData = ""; photoTimestamp = null;
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "กำลังตรวจสอบพิกัดล่าสุดแบบเรียลไทม์...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    const freshLat = pos.coords.latitude;
                    const freshLon = pos.coords.longitude;
                    userGps = freshLat + "," + freshLon;
                    
                    const freshDistance = haversineDistance(freshLat, freshLon, TARGET_LAT, TARGET_LON);
                    const locationType = locationTypeHidden.value;

                    if (locationType === "สำนักงาน" && freshDistance > RADIUS_LIMIT) {
                        alert("❌ ตรวจพบพิกัดล่าสุดของคุณอยู่นอกพื้นที่สำนักงาน (ห่าง " + Math.round(freshDistance) + " ม.) ไม่สามารถแอบกดบันทึกย้อนหลังได้ครับ");
                        checkLocation(); 
                        return;
                    }

                    proceedToSubmit();
                },
                function(err) {
                    if (locationTypeHidden.value === "นอกสถานที่") {
                        userGps = "ไม่พบพิกัด (นอกสถานที่)";
                        proceedToSubmit();
                    } else {
                        alert("❌ ไม่สามารถดึงพิกัดแบบเรียลไทม์ได้ โปรดเปิดสิทธิ์ GPS หรือย้ายไปที่สัญญาณเปิด");
                        checkLocation();
                    }
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        } else {
            proceedToSubmit();
        }
    });

    function proceedToSubmit() {
        submitBtn.innerText = "กำลังบันทึกข้อมูลเข้าระบบ...";
        
        const now = new Date();
        const currentTimeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const currentDateStr = now.toLocaleDateString('th-TH');
        const hour = now.getHours();
        const minute = now.getMinutes();

        const empType = document.getElementById('empType').value;
        const actionType = actionTypeHidden.value;
        const workTimeScope = workTimeScopeHidden.value; 
        const locationType = locationTypeHidden.value;
        let workStatus = "ปกติ";

        if (locationType === "นอกสถานที่") {
            if (actionType === "เข้างาน") {
                if (hour > 10 || (hour === 10 && minute > 0)) workStatus = "สาย";
            } else if (actionType === "เลิกงาน") {
                if (hour < 14) workStatus = "ขาดราชการ";
            }
        } else {
            if (actionType === "เข้างาน") {
                if (empType === "บุคคลภายนอกที่ช่วยปฏิบัติราชการ") { 
                    if (hour > 8 || (hour === 8 && minute > 0)) workStatus = "สาย";
                } else { 
                    if (hour > 7 || (hour === 7 && minute > 0)) workStatus = "สาย";
                }
            } else if (actionType === "เลิกงาน") { 
                if (empType === "บุคคลภายนอกที่ช่วยปฏิบัติราชการ") {
                    if (workTimeScope === "08:00-17:00") {
                        if (hour < 17) workStatus = "ขาดราชการ";
                    } else {
                        if (hour < 16) workStatus = "ขาดราชการ";
                    }
                } else { 
                    if (hour < 16) workStatus = "ขาดราชการ";
                }
            }
        }

        const missionLog = missionDetail.value ? ` | ภารกิจ: ${missionDetail.value}` : '';

        const payload = {
            timestamp: `${currentDateStr} ${currentTimeStr}`,
            fullname: document.getElementById('fullname').value,
            position: document.getElementById('position').value,
            subDepartment: document.getElementById('subDepartment').value,
            empType: empType === "บุคคลภายนอกที่ช่วยปฏิบัติราชการ" ? `บุคคลภายนอกฯ (${workTimeScope})` : empType, 
            actionType: `${actionType} (${locationType})${missionLog}`,
            workStatus: workStatus,
            gps: userGps,
            photo: photoData 
        };

        const webAppUrl = "https://script.google.com/macros/s/AKfycbxp_vFEevC9kkToh2vA5fHqjbVT_P7r39P32wH0me8G3PK7PCsBymhKcpxEE0Onm20-/exec";

        fetch(webAppUrl, {
            method: "POST",
            mode: "cors", 
            headers: { "Content-Type": "text/plain;charset=utf-8" }, 
            body: JSON.stringify(payload)
        })
        .then(response => {
            alertBox.style.display = "block";
            alertBox.classList.remove('alert-success', 'alert-danger');
            
            if (workStatus === "สาย" || workStatus === "ขาดราชการ") {
                alertBox.classList.add('alert-danger');
            } else {
                alertBox.classList.add('alert-success');
            }
            
            alertBox.innerHTML = `🔔 บันทึกสำเร็จเรียบร้อย!<br>คุณได้ลงเวลา ${actionType} (${locationType})<br>เวลา: <b>${currentTimeStr} น.</b><br>สถานะระบบสรุป: <span style="text-decoration:underline; font-weight:700;">${workStatus}</span>`;
            
            alert(`บันทึกเวลาสำเร็จ!\nประเภท: ${actionType} (${locationType})\nเวลา: ${currentTimeStr} น.\nผลสรุป: ${workStatus}`);
            
            document.getElementById('fullname').value = "";
            missionDetail.value = "";
            photoPreview.style.display = 'none';
            video.style.display = 'block';
            snapBtn.innerText = "📸 กดถ่ายภาพ";
            photoData = "";
            photoTimestamp = null;
            checkLocation(); 
            toggleMissionInput();
        })
        .catch(err => {
            alertBox.style.display = "block";
            alertBox.classList.remove('alert-success', 'alert-danger');
            alertBox.classList.add('alert-danger');
            alertBox.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์ กรุณาลองใหม่อีกครั้ง";
            submitBtn.disabled = false;
            evaluateButtonStatus();
        });
    }
</script>
