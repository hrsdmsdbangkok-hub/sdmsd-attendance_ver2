<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลาปฏิบัติงาน สำนักงานเลขานุการ สำนักการแพทย์</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap');

        :root {
            --primary: #1b5e20;
            --primary-light: #e8f5e9;
            --primary-border: #a5d6a7;
            --accent: #2e7d32;
            --accent-hover: #4caf50;
            --danger: #d32f2f;
            --danger-light: #ffebee;
            --danger-border: #ffcdd2;
            --gray-bg: #f1f3f5;
            --text-main: #212529;
        }

        body { 
            font-family: 'Sarabun', Arial, sans-serif; 
            background: linear-gradient(135deg, #f4faf6 0%, #e8f5e9 100%); 
            margin: 0; 
            padding: 15px; 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .card { 
            max-width: 480px; 
            width: 100%;
            margin: 20px auto; 
            background: #ffffff; 
            padding: 30px 24px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(27, 94, 32, 0.06); 
            border: 1px solid rgba(165, 214, 167, 0.4);
            box-sizing: border-box;
        }
        
        .text-center { text-align: center; }
        
        .logo { 
            max-width: 100px; 
            height: 100px; 
            margin-bottom: 16px; 
            background-color: #ffffff; 
            border-radius: 50%;         
            box-shadow: 0 8px 20px rgba(27, 94, 32, 0.1);
            padding: 4px;
            object-fit: cover;          
        }
        
        h2 { 
            font-size: 22px; 
            color: var(--primary); 
            margin: 5px 0; 
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        
        p.subtitle { 
            font-size: 13.5px; 
            color: var(--accent); 
            margin: 0 0 30px 0; 
            font-weight: 500;
        }
        
        .form-group { margin-bottom: 22px; text-align: left; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            color: var(--primary); 
        }
        
        input, select { 
            width: 100%; 
            padding: 13px 16px; 
            border: 1.5px solid var(--primary-border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 14.5px; 
            background-color: #fafdfa;
            color: var(--primary);
        }

        .segmented-control {
            display: flex;
            gap: 8px;
            background: var(--gray-bg);
            padding: 6px;
            border-radius: 14px;
        }

        .btn-segment {
            flex: 1;
            padding: 12px 10px;
            border: none;
            background: transparent;
            color: #6c757d;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-segment.active {
            background: #ffffff;
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(27, 94, 32, 0.12);
            font-weight: 700;
        }

        .camera-section { 
            background: #f4faf6; 
            padding: 20px; 
            border: 2px dashed var(--primary-border); 
            border-radius: 16px; 
            margin-bottom: 24px; 
            text-align: center; 
        }
        
        video, img { 
            width: 100%; 
            max-height: 260px; 
            border-radius: 12px; 
            background: #1a1a1a; 
            display: block; 
            margin: 0 auto; 
        }
        
        .btn-snap { 
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 25px; 
            cursor: pointer; 
            margin-top: 14px; 
            font-size: 13.5px; 
            font-weight: 600;
        }
        
        .btn-submit { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 6px 20px rgba(27, 94, 32, 0.25);
        }
        
        /* กล่องแจ้งเตือน/บอกพิกัด และระยะห่างเป็นเมตรดั้งเดิม */
        .alert-box { 
            padding: 16px; 
            border-radius: 14px; 
            margin-top: 24px; 
            font-size: 14.5px; 
            text-align: center; 
            font-weight: 600; 
            line-height: 1.6;
            display: block; 
        }
        
        .alert-success { background: var(--primary-light); color: var(--primary); border: 1px solid var(--primary-border); }
        .alert-danger { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger-border); }
    </style>
</head>
<body>

<div class="card">
    <div class="text-center">
        <img src="15.Logoสำนักงานเลขานุการสำนักการแพทย์.jpg" alt="โลโก้สำนักงานเลขานุการสำนักการแพทย์" class="logo" onerror="this.style.display='none';">
        <h2>ระบบลงเวลาปฏิบัติงาน</h2>
        <p class="subtitle">สำนักงานเลขานุการ สำนักการแพทย์</p>
    </div>

    <form id="mainForm">
        <div class="form-group">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="fullname" required placeholder="ระบุชื่อและนามสกุล">
        </div>
        
        <div class="form-group">
            <label>ตำแหน่ง</label>
            <select id="position" required>
                <option value="" disabled selected>--- กรุณาเลือกตำแหน่ง ---</option>
                <option value="นักจัดการงานทั่วไป">นักจัดการงานทั่วไป</option>
                <option value="นักทรัพยากรบุคคล">นักทรัพยากรบุคคล</option>
                <option value="นักวิชาการเงินและบัญชี">นักวิชาการเงินและบัญชี</option>
                <option value="นักวิชาการพัสดุ">นักวิชาการพัสดุ</option>
                <option value="นิติกร">นิติกร</option>
                <option value="ผู้ชำนาญการด้านทรัพยากรบุคคล">ผู้ชำนาญการด้านทรัพยากรบุคคล</option>
                <option value="ผู้เชี่ยวชาญด้านการคลังและกฎหมาย">ผู้เชี่ยวชาญด้านการคลังและกฎหมาย</option>
                <option value="ผู้เชี่ยวชาญด้านการเงินและงบประมาณ">ผู้เชี่ยวชาญด้านการเงินและงบประมาณ</option>
                <option value="ผู้เชี่ยวชาญด้านการบัญชีและพัสดุ">ผู้เชี่ยวชาญด้านการบัญชีและพัสดุ</option>
                <option value="ผู้เชี่ยวชาญด้านวิเคราะห์นโยบายและแผน">ผู้เชี่ยวชาญด้านวิเคราะห์นโยบายและแผน</option>
                <option value="เจ้าพนักงานธุรการ">เจ้าพนักงานธุรการ</option>
                <option value="เจ้าพนักงานโสตทัศนศึกษา">เจ้าพนักงานโสตทัศนศึกษา</option>
                <option value="นายช่างเทคนิค">นายช่างเทคนิค</option>
                <option value="ผู้ช่วยช่าง (ช่างเทคนิค)">ผู้ช่วยช่าง (ช่างเทคนิค)</option>
                <option value="พนักงานทั่วไป">พนักงานทั่วไป</option>
                <option value="พนักงานสถานที่">พนักงานสถานที่</option>
                <option value="พนักงานขับรถยนต์">พนักงานขับรถยนต์</option>
                <option value="อื่น ๆ">อื่น ๆ</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>สังกัดกลุ่มงาน</label>
            <select id="subDepartment" required>
                <option value="" disabled selected>--- กรุณาเลือกกลุ่มงาน ---</option>
                <option value="กลุ่มงานช่วยนักบริหาร">กลุ่มงานช่วยนักบริหาร</option>
                <option value="กลุ่มงานบริหารงานทั่วไป">กลุ่มงานบริหารงานทั่วไป</option>
                <option value="กลุ่มงานการเจ้าหน้าที่">กลุ่มงานการเจ้าหน้าที่</option>
                <option value="กลุ่มงานการคลัง">กลุ่มงานการคลัง</option>
                <option value="กลุ่มงานนิติการ">กลุ่มงานนิติการ</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>ประเภทของพนักงาน</label>
            <select id="empType" required>
                <option value="ลูกจ้างประจำ">ลูกจ้างประจำ</option>
                <option value="ลูกจ้างชั่วคราว">ลูกจ้างชั่วคราว</option>
                <option value="พนักงานประกันสังคม">พนักงานประกันสังคม</option>
                <option value="บุคคลภายนอกที่ช่วยปฏิบัติราชการ">บุคคลภายนอกที่ช่วยปฏิบัติราชการ</option>
            </select>
        </div>

        <div class="form-group">
            <label>สถานที่ปฏิบัติงาน</label>
            <div class="segmented-control">
                <button type="button" id="locOfficeBtn" class="btn-segment active">🏢 ในสำนักงาน</button>
                <button type="button" id="locOutsideBtn" class="btn-segment">🚗 นอกสถานที่</button>
            </div>
            <input type="hidden" id="locationType" value="สำนักงาน">
        </div>

        <div class="form-group">
            <label>ประเภทการลงเวลา</label>
            <div class="segmented-control">
                <button type="button" id="actInBtn" class="btn-segment active">☀️ เข้างาน</button>
                <button type="button" id="actOutBtn" class="btn-segment">🌙 เลิกงาน</button>
            </div>
            <input type="hidden" id="actionType" value="เข้างาน">
        </div>

        <div class="form-group" id="missionGroup" style="display:none;">
            <label style="color: var(--danger);">📝 ระบุภารกิจและสถานที่ปฏิบัติงานนอกสถานที่ *</label>
            <input type="text" id="missionDetail" placeholder="ตัวอย่าง: ประชุมวิชาการ ณ โรงแรมรามาการ์เเดนส์">
        </div>

        <div class="form-group" id="workTimeGroup" style="display:none;">
            <label>ช่วงเวลาปฏิบัติงาน (เฉพาะบุคคลภายนอกฯ)</label>
            <div class="segmented-control">
                <button type="button" id="time16Btn" class="btn-segment active">⏱️ 08:00 - 16:00 น.</button>
                <button type="button" id="time17Btn" class="btn-segment">⏱️ 08:00 - 17:00 น.</button>
            </div>
            <input type="hidden" id="workTimeScope" value="08:00-16:00">
        </div>

        <div class="camera-section">
            <label>📸 ถ่ายภาพเซลฟี่กับสถานที่ทำงาน</label>
            <video id="video" autoplay playsinline></video>
            <img id="photoPreview" style="display:none;">
            <button type="button" class="btn-snap" id="snapBtn">📸 กดถ่ายภาพ</button>
            
            <div id="fallbackUpload" style="margin-top:10px; font-size:12px; display:none;">
                <p style="color:red; margin:5px 0;">หากกล้องใช้งานไม่ได้ ให้เลือกไฟล์รูปภาพแทน:</p>
                <input type="file" id="fileInput" accept="image/*">
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">📌 บันทึกเวลาปฏิบัติงาน</button>
    </form>

    <div id="alertBox" class="alert-box alert-success">📡 กำลังตรวจสอบพิกัดพิกัดของคุณ...</div>
</div>

<script>
    const TARGET_LAT = 13.766324; 
    const TARGET_LON = 100.470656;
    const RADIUS_LIMIT = 500; 

    let userGps = "ไม่พบพิกัด";
    let photoData = "";
    let photoTimestamp = null; 
    let lastLat = null;
    let lastLon = null;

    const submitBtn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');
    const video = document.getElementById('video');
    const photoPreview = document.getElementById('photoPreview');
    const snapBtn = document.getElementById('snapBtn');
    const fallbackUpload = document.getElementById('fallbackUpload');
    const fileInput = document.getElementById('fileInput');
    
    const locationTypeHidden = document.getElementById('locationType');
    const actionTypeHidden = document.getElementById('actionType');
    const workTimeScopeHidden = document.getElementById('workTimeScope');
    const missionGroup = document.getElementById('missionGroup');
    const missionDetail = document.getElementById('missionDetail');

    window.addEventListener('load', () => {
        checkLocationQuick(); 
        startCamera();
    });

    document.getElementById('locOfficeBtn').addEventListener('click', function() {
        this.classList.add('active');
        document.getElementById('locOutsideBtn').classList.remove('active');
        locationTypeHidden.value = "สำนักงาน";
        toggleMissionInput();
        updateGpsDisplay(); // อัปเดตการแสดงผลทันทีเมื่อเปลี่ยนโหมด
    });

    document.getElementById('locOutsideBtn').addEventListener('click', function() {
        this.classList.add('active');
        document.getElementById('locOfficeBtn').classList.remove('active');
        locationTypeHidden.value = "นอกสถานที่";
        toggleMissionInput();
        updateGpsDisplay(); // อัปเดตการแสดงผลทันทีเมื่อเปลี่ยนโหมด
    });

    document.getElementById('actInBtn').addEventListener('click', function() {
        this.classList.add('active');
        document.getElementById('actOutBtn').classList.remove('active');
        actionTypeHidden.value = "เข้างาน";
        toggleMissionInput();
    });

    document.getElementById('actOutBtn').addEventListener('click', function() {
        this.classList.add('active');
        document.getElementById('actInBtn').classList.remove('active');
        actionTypeHidden.value = "เลิกงาน";
        toggleMissionInput();
    });

    document.getElementById('time16Btn').addEventListener('click', function() {
        this.classList.add('active');
        document.getElementById('time17Btn').classList.remove('active');
        workTimeScopeHidden.value = "08:00-16:00";
    });

    document.getElementById('time17Btn').addEventListener('click', function() {
        this.classList.add('active');
        document.getElementById('time16Btn').classList.remove('active');
        workTimeScopeHidden.value = "08:00-17:00";
    });

    document.getElementById('empType').addEventListener('change', function() {
        document.getElementById('workTimeGroup').style.display = (this.value === "บุคคลภายนอกที่ช่วยปฏิบัติราชการ") ? 'block' : 'none';
    });

    function toggleMissionInput() {
        const isOutside = locationTypeHidden.value === "นอกสถานที่";
        const isCheckIn = actionTypeHidden.value === "เข้างาน";
        missionGroup.style.display = (isOutside && isCheckIn) ? 'block' : 'none';
        missionDetail.required = (isOutside && isCheckIn);
    }

    // ฟังก์ชันคำนวณและแสดงผลระยะห่างลงกล่อง Alert Box สไตล์ดั้งเดิม
    function updateGpsDisplay() {
        if (lastLat === null || lastLon === null) return;

        if (locationTypeHidden.value === "สำนักงาน") {
            const dist = haversineDistance(lastLat, lastLon, TARGET_LAT, TARGET_LON);
            const roundedDist = Math.round(dist);

            if (dist <= RADIUS_LIMIT) {
                alertBox.className = "alert-box alert-success";
                alertBox.innerHTML = `📍 พิกัดของคุณห่างจากสำนักงาน: <b>${roundedDist} เมตร</b><br><span style="color:#1b5e20; font-size:13px;">(อยู่ในรัศมีล็อกพิกัด 500 ม. ลงเวลาได้ปกติ)</span>`;
            } else {
                alertBox.className = "alert-box alert-danger";
                alertBox.innerHTML = `⚠️ คุณอยู่ห่างจากสำนักงานเกินไป: <b style="text-decoration:underline;">${roundedDist} เมตร</b><br><span style="font-size:13px;">(จำกัดรัศมี 500 ม. โปรดขยับเข้าใกล้บริเวณสำนักงาน)</span>`;
            }
        } else {
            // ถ้านอกสถานที่ แสดงเป็นค่าพิกัดปกติ
            alertBox.className = "alert-box alert-success";
            alertBox.innerHTML = `📍 พิกัดปัจจุบันของคุณ: <b>${lastLat.toFixed(5)}, ${lastLon.toFixed(5)}</b> (โหมดนอกสถานที่)`;
        }
    }

    function checkLocationQuick() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) { 
                    lastLat = pos.coords.latitude;
                    lastLon = pos.coords.longitude;
                    userGps = lastLat + "," + lastLon;
                    updateGpsDisplay();
                },
                function(err) { 
                    alertBox.className = "alert-box alert-danger";
                    alertBox.innerHTML = `📡 พิกัดปัจจุบันของคุณ: <b>ไม่พบพิกัด (โปรดเปิดสิทธิ์ GPS ของเบราว์เซอร์)</b>`;
                },
                { enableHighAccuracy: false, timeout: 4000, maximumAge: 30000 }
            );
        } else {
            alertBox.className = "alert-box alert-danger";
            alertBox.innerHTML = `📡 พิกัดปัจจุบันของคุณ: <b>เบราว์เซอร์ไม่รองรับระบบ GPS</b>`;
        }
    }

    function startCamera() {
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                .then(function(stream) { video.srcObject = stream; })
                .catch(function(err) {
                    video.style.display = 'none';
                    fallbackUpload.style.display = 'block';
                });
        } else {
            video.style.display = 'none';
            fallbackUpload.style.display = 'block';
        }
    }

    snapBtn.addEventListener('click', () => {
        if (video.style.display !== 'none' && video.srcObject) {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640; 
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            photoData = canvas.toDataURL('image/jpeg', 0.6); 
            photoPreview.src = photoData;
            photoTimestamp = new Date(); 
            video.style.display = 'none'; photoPreview.style.display = 'block';
            snapBtn.innerText = "🔄 ถ่ายใหม่อีกครั้ง";
        } else {
            video.style.display = 'block'; photoPreview.style.display = 'none';
            snapBtn.innerText = "📸 กดถ่ายภาพ"; photoData = ""; photoTimestamp = null;
        }
    });

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                photoData = event.target.result;
                photoPreview.src = photoData;
                photoPreview.style.display = 'block';
                photoTimestamp = new Date();
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('mainForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        if (!photoData) {
            alert("กรุณาถ่ายภาพหรือเลือกไฟล์รูปภาพก่อนบันทึกเวลาครับ");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "กำลังตรวจสอบพิกัดล่าสุด...";
        alertBox.className = "alert-box alert-success";
        alertBox.innerHTML = `📡 พิกัดปัจจุบันของคุณ: <b>กำลังดึงพิกัดความละเอียดสูงเพื่อล็อกรัศมี...</b>`;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    lastLat = pos.coords.latitude;
                    lastLon = pos.coords.longitude;
                    userGps = lastLat + "," + lastLon;
                    
                    const dist = haversineDistance(lastLat, lastLon, TARGET_LAT, TARGET_LON);
                    
                    if (locationTypeHidden.value === "สำนักงาน" && dist > RADIUS_LIMIT) {
                        alert("❌ คุณอยู่นอกพื้นที่สำนักงาน (ห่าง " + Math.round(dist) + " ม.) ไม่สามารถลงเวลาในสำนักงานได้ครับ");
                        submitBtn.disabled = false;
                        submitBtn.innerText = "📌 บันทึกเวลาปฏิบัติงาน";
                        updateGpsDisplay();
                        return;
                    }
                    proceedToSubmit();
                },
                function(err) {
                    if (locationTypeHidden.value === "นอกสถานที่") {
                        userGps = "ไม่พบพิกัด (นอกสถานที่)";
                        proceedToSubmit();
                    } else {
                        alert("❌ ระบบบล็อกการลงเวลาเนื่องจากหาพิกัด GPS ไม่พบ โปรดเปิดสิทธิ์เข้าถึง GPS ของเบราว์เซอร์");
                        submitBtn.disabled = false;
                        submitBtn.innerText = "📌 บันทึกเวลาปฏิบัติงาน";
                        checkLocationQuick();
                    }
                },
                { enableHighAccuracy: true, timeout: 5000 } 
            );
        } else {
            proceedToSubmit();
        }
    });

    function haversineDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function proceedToSubmit() {
        submitBtn.innerText = "กำลังบันทึกเข้าระบบ...";
        const now = new Date();
        const currentTimeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const currentDateStr = now.toLocaleDateString('th-TH');
        const hour = now.getHours();
        const minute = now.getMinutes();

        const empType = document.getElementById('empType').value;
        const actionType = actionTypeHidden.value;
        const workTimeScope = workTimeScopeHidden.value; 
        const locationType = locationTypeHidden.value;
        let workStatus = "ปกติ";

        if (locationType === "นอกสถานที่") {
            if (actionType === "เข้างาน" && (hour > 10 || (hour === 10 && minute > 0))) workStatus = "สาย";
            if (actionType === "เลิกงาน" && hour < 14) workStatus = "ขาดราชการ";
        } else {
            if (actionType === "เข้างาน") {
                if (empType === "บุคคลภายนอกที่ช่วยปฏิบัติราชการ" && (hour > 8 || (hour === 8 && minute > 0))) workStatus = "สาย";
                else if (empType !== "บุคคลภายนอกที่ช่วยปฏิบัติราชการ" && (hour > 7 || (hour === 7 && minute > 0))) workStatus = "สาย";
            } else if (actionType === "เลิกงาน") {
                if (empType === "บุคคลภายนอกที่ช่วยปฏิบัติราชการ") {
                    if (workTimeScope === "08:00-17:00" && hour < 17) workStatus = "ขาดราชการ";
                    else if (workTimeScope !== "08:00-17:00" && hour < 16) workStatus = "ขาดราชการ";
                } else if (hour < 16) {
                    workStatus = "ขาดราชการ";
                }
            }
        }

        const missionLog = missionDetail.value ? ` | ภารกิจ: ${missionDetail.value}` : '';

        const payload = {
            timestamp: `${currentDateStr} ${currentTimeStr}`,
            fullname: document.getElementById('fullname').value,
            position: document.getElementById('position').value,
            subDepartment: document.getElementById('subDepartment').value,
            empType: empType === "บุคคลภายนอกที่ช่วยปฏิบัติราชการ" ? `บุคคลภายนอกฯ (${workTimeScope})` : empType, 
            actionType: `${actionType} (${locationType})${missionLog}`,
            workStatus: workStatus,
            gps: userGps,
            photo: photoData 
        };

        const webAppUrl = "https://script.google.com/macros/s/AKfycbxp_vFEevC9kkToh2vA5fHqjbVT_P7r39P32wH0me8G3PK7PCsBymhKcpxEE0Onm20-/exec";

        fetch(webAppUrl, {
            method: "POST",
            mode: "cors", 
            headers: { "Content-Type": "text/plain;charset=utf-8" }, 
            body: JSON.stringify(payload)
        })
        .then(response => {
            alertBox.classList.remove('alert-success', 'alert-danger');
            if (workStatus === "สาย" || workStatus === "ขาดราชการ") {
                alertBox.classList.add('alert-danger');
            } else {
                alertBox.classList.add('alert-success');
            }
            alertBox.innerHTML = `🔔 บันทึกสำเร็จเรียบร้อย!<br>คุณได้ลงเวลา ${actionType} (${locationType})<br>เวลา: <b>${currentTimeStr} น.</b><br>สถานะระบบสรุป: <span style="text-decoration:underline; font-weight:700;">${workStatus}</span>`;
            
            alert(`บันทึกเวลาสำเร็จ!\nประเภท: ${actionType} (${locationType})\nเวลา: ${currentTimeStr} น.\nผลสรุป: ${workStatus}`);
            
            document.getElementById('fullname').value = "";
            missionDetail.value = "";
            photoPreview.style.display = 'none';
            if(video.style.display === 'none' && !fallbackUpload.style.display) video.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerText = "📌 บันทึกเวลาปฏิบัติงาน";
            
            // แสดงสถานะบันทึกสำเร็จทิ้งไว้ 6 วินาที ก่อนดึงระบบคำนวณระยะห่างเป็นเมตรกลับมาโชว์ใหม่ตามปกติ
            setTimeout(checkLocationQuick, 6000);
        })
        .catch(err => {
            alertBox.className = "alert-box alert-danger";
            alertBox.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์ กรุณาลองใหม่อีกครั้ง";
            submitBtn.disabled = false;
            submitBtn.innerText = "📌 บันทึกเวลาปฏิบัติงาน";
            setTimeout(checkLocationQuick, 3000);
        });
    }
</script>
